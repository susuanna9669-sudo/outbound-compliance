<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外呼合规监控工具 V3</title>
<link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;
  --glass:rgba(255,255,255,.04);
  --glass-border:rgba(255,255,255,.07);
  --glass-hover:rgba(255,255,255,.08);
  --text:#e8e8f0;
  --t2:rgba(255,255,255,.45);
  --accent:#6c5ce7;
  --accent2:#a29bfe;
  --gradient:linear-gradient(135deg,#6c5ce7,#a29bfe);
  --gradient2:linear-gradient(135deg,#00b894,#55efc4);
  --gradient3:linear-gradient(135deg,#e17055,#fab1a0);
  --gradient4:linear-gradient(135deg,#0984e3,#74b9ff);
  --green:#00b894;
  --red:#e17055;
  --orange:#fdcb6e;
  --radius:16px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 50%,rgba(108,99,231,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(162,155,254,.05) 0%,transparent 50%);pointer-events:none;z-index:0}

/* Glass Card */
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--shadow)}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,18,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--glass-border);padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between}
.hl{display:flex;align-items:center;gap:14px}
.hl .icon{width:38px;height:38px;background:var(--gradient);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.hl h1{font-size:18px;font-weight:600;letter-spacing:.3px}
.hl .ver{font-size:10px;background:rgba(108,99,231,.25);color:var(--accent2);padding:1px 8px;border-radius:10px;margin-left:6px;font-weight:500}
.hr{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--t2)}
.hr .d{display:flex;align-items:center;gap:6px}

.container{max-width:1320px;margin:0 auto;padding:24px;position:relative;z-index:1}

/* Stats Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.card{padding:22px 24px;position:relative;overflow:hidden;transition:transform .25s ease,box-shadow .25s ease;cursor:default}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.card .ico{position:absolute;right:18px;top:18px;font-size:28px;opacity:.1;transition:opacity .3s}
.card:hover .ico{opacity:.2}
.card .num{font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.card .lbl{font-size:12px;color:var(--t2);font-weight:400}
.card .sub{font-size:10px;color:var(--t2);margin-top:5px;opacity:.7}
.cg{background:linear-gradient(135deg,rgba(0,184,148,.08),rgba(85,239,196,.04));border-color:rgba(0,184,148,.2)}
.cg .num{color:var(--green)}
.cr{background:linear-gradient(135deg,rgba(225,112,85,.08),rgba(250,177,160,.04));border-color:rgba(225,112,85,.2)}
.cr .num{color:var(--red)}
.co{background:linear-gradient(135deg,rgba(253,203,110,.08),rgba(255,234,167,.04));border-color:rgba(253,203,110,.2)}
.co .num{color:var(--orange)}
.cp{background:linear-gradient(135deg,rgba(108,99,231,.08),rgba(162,155,254,.04));border-color:rgba(108,99,231,.2)}
.cp .num{color:var(--accent2)}
.cb{background:linear-gradient(135deg,rgba(9,132,227,.08),rgba(116,185,255,.04));border-color:rgba(9,132,227,.2)}
.cb .num{color:#74b9ff}

/* Gradient Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s ease;font-family:inherit;letter-spacing:.2px}
.btn:active{transform:scale(.96)}
.bp{background:var(--gradient);color:#fff;box-shadow:0 4px 16px rgba(108,99,231,.3)}
.bp:hover{box-shadow:0 6px 24px rgba(108,99,231,.45);transform:translateY(-2px)}
.bg{background:var(--gradient2);color:#fff;box-shadow:0 4px 16px rgba(0,184,148,.3)}
.bg:hover{box-shadow:0 6px 24px rgba(0,184,148,.45);transform:translateY(-2px)}
.br{background:var(--gradient3);color:#fff;box-shadow:0 4px 16px rgba(225,112,85,.3)}
.br:hover{box-shadow:0 6px 24px rgba(225,112,85,.45);transform:translateY(-2px)}
.bo{background:var(--gradient4);color:#fff;box-shadow:0 4px 16px rgba(9,132,227,.3)}
.bo:hover{box-shadow:0 6px 24px rgba(9,132,227,.45);transform:translateY(-2px)}
.bk{background:var(--glass);color:var(--text);border:1px solid var(--glass-border)}
.bk:hover{background:var(--glass-hover);border-color:rgba(255,255,255,.15)}
.bs{padding:8px 14px;font-size:11px}
.ab{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}

/* Import Zone */
.iz{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px dashed var(--glass-border);border-radius:var(--radius);padding:44px 32px;text-align:center;transition:all .3s;cursor:pointer;margin-bottom:20px}
.iz:hover,.iz.dragover{border-color:var(--accent);background:rgba(108,99,231,.04)}
.iz .ii{font-size:36px;color:var(--accent2);margin-bottom:10px;opacity:.7}
.iz h3{font-size:16px;font-weight:500;margin-bottom:4px}
.iz p{font-size:12px;color:var(--t2)}
.iz .ft{display:flex;gap:8px;justify-content:center;margin-top:10px}
.iz .ft span{background:rgba(108,99,231,.12);color:var(--accent2);padding:3px 10px;border-radius:8px;font-size:10px;font-weight:500}
.iz .fi{margin-top:10px;padding:8px 16px;background:rgba(0,184,148,.1);border-radius:8px;display:none;font-size:12px}
.iz .fi.show{display:inline-block}
.iz input{display:none}

/* Summary Banner */
.sb{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 24px;margin-bottom:16px;display:none;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.sb.show{display:flex}
.sbi{display:flex;align-items:center;gap:10px}
.sbi .ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.sbi .icg{background:rgba(0,184,148,.15);color:var(--green)}
.sbi .icr{background:rgba(225,112,85,.15);color:var(--red)}
.sbi .ico{background:rgba(253,203,110,.15);color:var(--orange)}
.sbi .in{font-size:18px;font-weight:700}
.sbi .il{font-size:10px;color:var(--t2);margin-top:-1px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:12px;padding:4px}
.tab{flex:1;padding:10px 14px;border:none;background:transparent;color:var(--t2);font-size:12px;cursor:pointer;border-radius:8px;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.tab:hover{background:rgba(255,255,255,.04);color:var(--text)}
.tab.active{background:var(--gradient);color:#fff;box-shadow:0 4px 12px rgba(108,99,231,.25)}
.tc{display:none}.tc.active{display:block}

/* Table Wrapper */
.tw{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden}
.th{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.05)}
.th h3{font-size:14px;font-weight:500}
.th .badge{background:rgba(108,99,231,.12);color:var(--accent2);padding:2px 10px;border-radius:20px;font-size:10px}
.tc2{overflow-x:auto;max-height:540px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;background:rgba(10,10,18,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:10px 14px;text-align:left;font-size:10px;letter-spacing:.4px;color:var(--t2);font-weight:500;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.04)}
tbody td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;transition:background .15s}
tbody tr:hover td{background:rgba(255,255,255,.02)}

.rule-badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:10px;font-weight:500;letter-spacing:.2px}
.r1{background:rgba(253,203,110,.12);color:var(--orange)}
.r2{background:rgba(225,112,85,.12);color:var(--red)}
.r3{background:rgba(149,165,166,.12);color:#b2bec3}

.detail-btn{background:rgba(108,99,231,.1);border:1px solid rgba(108,99,231,.2);color:var(--accent2);padding:3px 10px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .2s}
.detail-btn:hover{background:rgba(108,99,231,.2);border-color:var(--accent)}

tr.detail{display:none}tr.detail.show{display:table-row}tr.detail td{padding:0;background:rgba(0,0,0,.15)}
.dp{padding:14px 20px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
.dp .ct{width:100%;border-collapse:collapse;margin-top:4px}
.dp .ct th{background:rgba(0,0,0,.25);padding:5px 10px;font-size:10px;color:var(--t2);text-transform:none;letter-spacing:0;position:static;backdrop-filter:none}
.dp .ct td{padding:5px 10px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03)}
.dp .sl{font-size:11px;font-weight:500;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:6px}

.st{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px}
.sta{background:rgba(0,184,148,.12);color:var(--green)}
.stb{background:rgba(253,203,110,.12);color:var(--orange)}
.sto{background:rgba(255,255,255,.06);color:var(--t2)}

.high{color:var(--green);font-weight:600;font-size:11px}
.mid{color:var(--orange);font-weight:500;font-size:11px}

.empty{text-align:center;padding:48px 20px}
.empty i{font-size:36px;color:var(--t2);opacity:.2;margin-bottom:10px}
.empty p{color:var(--t2);font-size:12px}

/* Charts */
.cr2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.cc{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px}
.cc h4{font-size:12px;font-weight:500;margin-bottom:14px;color:var(--t2);display:flex;align-items:center;gap:6px}
.cc canvas{max-height:250px}

/* Loading */
.lo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,18,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lo.show{display:flex}
.ls{width:48px;height:48px;border:3px solid rgba(255,255,255,.06);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lo p{font-size:14px;color:var(--t2)}
.lo .pb{width:260px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.lo .pf{height:100%;background:var(--gradient);border-radius:2px;animation:prog 1.8s ease-in-out infinite}
@keyframes prog{0%{width:0}50%{width:70%}100%{width:100%}}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:12px;background:rgba(26,26,46,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;z-index:1000;font-size:13px}
.toast.show{display:flex;align-items:center;gap:8px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.s{border-color:rgba(0,184,148,.3)}.toast.e{border-color:rgba(225,112,85,.3)}.toast.i{border-color:rgba(9,132,227,.3)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}

@media(max-width:768px){
.header{padding:0 16px;height:60px}
.hl h1{font-size:15px}.hr{font-size:11px;gap:8px}
.container{padding:16px}
.grid{grid-template-columns:repeat(2,1fr)}
.cr2{grid-template-columns:1fr}
.ab{flex-direction:column}
.card{padding:16px 18px}.card .num{font-size:24px}
.tab{font-size:11px;padding:8px 10px}
tbody td{font-size:11px;padding:7px 10px}
.iz{padding:32px 20px}
}
</style>
</head>
<body>

<div id="toast" class="toast"><span id="tm"></span></div>

<div class="header">
  <div class="hl">
    <div class="icon"><i class="fas fa-shield-alt"></i></div>
    <div><h1>外呼合规监控<span class="ver">V3</span></h1></div>
  </div>
  <div class="hr" id="hdr"><div class="d"><i class="far fa-clock" style="font-size:11px"></i><span id="clock">--:--:--</span></div><div class="d"><i class="fas fa-database"></i><span>加载中...</span></div></div>
</div>

<div class="lo" id="lo"><div class="ls"></div><p id="lot">分析中...</p><div class="pb"><div class="pf"></div></div></div>

<div class="container">

  <div class="iz" id="importZone">
    <div class="ii"><i class="fas fa-cloud-upload-alt"></i></div>
    <h3>导入最新外呼记录</h3>
    <p>拖拽或点击上传 → 自动合并到数据库 → 刷新合规分析</p>
    <div class="ft"><span><i class="fas fa-file-excel"></i> .xlsx</span><span><i class="fas fa-file-excel"></i> .xls</span><span><i class="fas fa-file-csv"></i> .csv</span></div>
    <div class="fi" id="fi"><i class="fas fa-check-circle" style="color:var(--green)"></i> <span id="fn"></span></div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  </div>

  <div class="grid" id="statsGrid">
    <div class="card cp glass" id="sc1"><div class="ico"><i class="fas fa-phone-alt"></i></div><div class="num" id="sTotal">-</div><div class="lbl">数据库号码</div><div class="sub" id="sDbRef"></div></div>
    <div class="card cg glass" id="sc2"><div class="ico"><i class="fas fa-check-circle"></i></div><div class="num" id="sCompliant">-</div><div class="lbl">✅ 合规可外呼</div><div class="sub" id="sCompliantRate"></div></div>
    <div class="card co glass" id="sc3"><div class="ico"><i class="fas fa-ban"></i></div><div class="num" id="sFreqBlock">-</div><div class="lbl">🚫 风控拦截</div><div class="sub">R1外呼上限 / R2接通上限</div></div>
    <div class="card cr glass" id="sc4"><div class="ico"><i class="fas fa-times-circle"></i></div><div class="num" id="sOtherBlock">-</div><div class="lbl">⛔ 其他屏蔽</div><div class="sub">语音助手 / A意向 / B意向</div></div>
  </div>

  <div class="ab">
    <button class="btn bp" onclick="startAnalysis()"><i class="fas fa-sync-alt"></i> 开始全面分析</button>
    <button class="btn bg bs" onclick="downloadList('compliant')" disabled id="dl1"><i class="fas fa-download"></i> 合规名单</button>
    <button class="btn bo bs" onclick="downloadList('freq')" disabled id="dl2"><i class="fas fa-download"></i> 风控拦截</button>
    <button class="btn br bs" onclick="downloadList('other')" disabled id="dl3"><i class="fas fa-download"></i> 其他屏蔽</button>
  </div>

  <div class="sb" id="sb">
    <div class="sbi"><div class="ic icg"><i class="fas fa-check"></i></div><div><div class="in" id="sb1">-</div><div class="il">合规可外呼</div></div></div>
    <div class="sbi"><div class="ic ico"><i class="fas fa-ban"></i></div><div><div class="in" id="sb2">-</div><div class="il">风控拦截</div></div></div>
    <div class="sbi"><div class="ic icr"><i class="fas fa-times"></i></div><div><div class="in" id="sb3">-</div><div class="il">其他屏蔽</div></div></div>
    <div class="sbi"><i class="far fa-calendar-alt" style="color:var(--t2);font-size:12px"></i><span style="font-size:11px;color:var(--t2)" id="sb4"></span></div>
  </div>

  <div class="cr2">
    <div class="cc"><h4><i class="fas fa-chart-pie"></i> 合规 / 拦截 / 屏蔽</h4><canvas id="pieChart"></canvas></div>
    <div class="cc"><h4><i class="fas fa-chart-bar"></i> 屏蔽原因分布</h4><canvas id="barChart"></canvas></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('t1',this)"><i class="fas fa-check-circle"></i> 合规名单 <span id="tc1" style="background:rgba(0,184,148,.12);color:var(--green);font-size:10px;padding:0 7px;border-radius:8px">0</span></button>
    <button class="tab" onclick="switchTab('t2',this)"><i class="fas fa-ban"></i> 风控拦截 <span id="tc2" style="background:rgba(253,203,110,.12);color:var(--orange);font-size:10px;padding:0 7px;border-radius:8px">0</span></button>
    <button class="tab" onclick="switchTab('t3',this)"><i class="fas fa-times-circle"></i> 其他屏蔽 <span id="tc3" style="background:rgba(225,112,85,.12);color:var(--red);font-size:10px;padding:0 7px;border-radius:8px">0</span></button>
  </div>

  <div class="tc active" id="t1"><div class="tw"><div class="th"><h3><i class="fas fa-check-circle" style="color:var(--green);font-size:13px"></i> 合规可外呼 <span style="font-size:10px;color:var(--t2);font-weight:400;margin-left:6px">按距今天数降序 · 优先外呼</span></h3><span class="badge" id="ct1">0</span></div><div class="tc2" id="ct1c"></div></div></div>
  <div class="tc" id="t2"><div class="tw"><div class="th"><h3><i class="fas fa-ban" style="color:var(--orange);font-size:13px"></i> 风控拦截（频率）</h3><span class="badge" id="ct2">0</span></div><div class="tc2" id="ct2c"></div></div></div>
  <div class="tc" id="t3"><div class="tw"><div class="th"><h3><i class="fas fa-times-circle" style="color:var(--red);font-size:13px"></i> 其他屏蔽</h3><span class="badge" id="ct3">0</span></div><div class="tc2" id="ct3c"></div></div></div>

</div>

<script>
let resultData = null;

function toast(m,t='s'){
  const el=document.getElementById('toast'),msg=document.getElementById('tm');
  el.className='toast '+t; msg.textContent=m; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}

function loading(show,text='处理中...'){
  document.getElementById('lo').classList.toggle('show',show);
  document.getElementById('lot').textContent=text;
}

// Clock
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(updateClock,1000);updateClock();

// Import
const iz=document.getElementById('importZone'),fi=document.getElementById('fileInput');
iz.addEventListener('click',()=>fi.click());
iz.addEventListener('dragover',e=>{e.preventDefault();iz.classList.add('dragover')});
iz.addEventListener('dragleave',()=>iz.classList.remove('dragover'));
iz.addEventListener('drop',e=>{e.preventDefault();iz.classList.remove('dragover');if(e.dataTransfer.files.length)handleImport(e.dataTransfer.files[0])});
fi.addEventListener('change',()=>{if(fi.files.length)handleImport(fi.files[0])});

function handleImport(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext)){toast('请上传 Excel 或 CSV 文件','e');return}
  document.getElementById('fn').textContent=file.name+' ('+(file.size/1024).toFixed(1)+' KB)';
  document.getElementById('fi').classList.add('show');
  doImport(file);
}

async function doImport(file){
  const fd=new FormData();fd.append('file',file);
  loading(true,'正在导入并合并...');
  try{
    const res=await fetch('/api/import',{method:'POST',body:fd});
    const d=await res.json();
    if(d.error){toast(d.error,'e');loading(false);return}
    toast('导入成功 +'+d.new_records+'条 · 共'+d.total_phones+'个号码','s');
    loading(false);loadStats();
  }catch(e){toast('网络错误','e');loading(false)}
}

async function startAnalysis(){
  const totalEl=document.getElementById('sTotal');
  loading(true,'分析 '+(totalEl?totalEl.textContent:'')+' 个号码...');
  try{
    const res=await fetch('/api/analyze',{method:'POST'});
    const d=await res.json();
    // 保存全量数据供下载
    resultData=d;
    loading(false);
    renderResults(d);
  }catch(e){console.error(e);toast('分析失败: '+e.message,'e');loading(false)}
}

function renderResults(data){
  const {summary,compliant,freq_block,other_block}=data;
  document.getElementById('sTotal').textContent=summary.total.toLocaleString();
  document.getElementById('sCompliant').textContent=summary.compliant.toLocaleString();
  const rate=(summary.compliant/summary.total*100).toFixed(1);
  document.getElementById('sCompliantRate').textContent='合规率 '+rate+'%';
  document.getElementById('sFreqBlock').textContent=summary.freq_block.toLocaleString();
  document.getElementById('sOtherBlock').textContent=summary.other_block.toLocaleString();
  document.getElementById('sb').classList.add('show');
  document.getElementById('sb1').textContent=summary.compliant.toLocaleString();
  document.getElementById('sb2').textContent=summary.freq_block.toLocaleString();
  document.getElementById('sb3').textContent=summary.other_block.toLocaleString();
  document.getElementById('sb4').textContent=(new Date()).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('tc1').textContent=summary.compliant;
  document.getElementById('tc2').textContent=summary.freq_block;
  document.getElementById('tc3').textContent=summary.other_block;
  document.getElementById('ct1').textContent=summary.compliant+' 个';
  document.getElementById('ct2').textContent=summary.freq_block+' 条';
  document.getElementById('ct3').textContent=summary.other_block+' 条';
  document.getElementById('dl1').disabled=false;
  document.getElementById('dl2').disabled=false;
  document.getElementById('dl3').disabled=false;
  renderTable('ct1c',compliant,'compliant');
  renderTable('ct2c',freq_block,'freq');
  renderTable('ct3c',other_block,'other');
  renderCharts(summary);
}

function renderTable(id,items,type){
  const el=document.getElementById(id);
  if(!items||!items.length){
    el.innerHTML='<div class="empty"><i class="fas fa-check-circle"></i><p>暂无数据</p></div>';return;
  }
  // 显示前500条，超出的提示下载
  const DISPLAY_LIMIT=500;
  const showItems=items.slice(0,DISPLAY_LIMIT);
  const hasMore=items.length>DISPLAY_LIMIT;
  let h='<table><thead><tr>';
  if(type==='compliant')h+='<th>#</th><th>手机号</th><th>话术分类</th><th>最新外呼任务</th><th>归属地</th><th>最后呼叫</th><th>距今天数</th><th>30天</th><th>15天</th><th>接听</th><th>建议</th><th></th>';
  else if(type==='freq')h+='<th>#</th><th>手机号</th><th>最新任务</th><th>归属地</th><th>拦截原因</th><th>30天</th><th>15天</th><th>接听</th><th>最后呼叫</th><th></th>';
  else h+='<th>#</th><th>手机号</th><th>最新任务</th><th>归属地</th><th>屏蔽原因</th><th>历史状态</th><th>最后呼叫</th><th></th>';
  h+='</tr></thead><tbody>';
  showItems.forEach((item,i)=>{
    if(type==='compliant'){
      const days=item.days_since_last_call||999,p=days>=14?'<span class="high">高</span>':days>=7?'<span class="mid">中</span>':'<span style="color:var(--t2);font-size:11px">常规</span>';
      const scriptType=item.ever_answered?'<span style="color:var(--green);font-weight:500;font-size:11px">📞 已接听</span>':'<span style="color:var(--t2);font-size:11px">📱 非已接听</span>';
      h+=`<tr><td>${i+1}</td><td style="font-family:monospace;font-weight:500;font-size:12px">${item.phone}</td><td>${scriptType}</td>
        <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:var(--t2)" title="${item.latest_task||''}">${item.latest_task||'-'}</td>
        <td style="font-size:11px">${item.region||'-'}</td>
        <td style="font-size:11px;font-family:monospace;color:var(--t2)">${item.last_call_time?item.last_call_time.slice(5,10):'-'}</td>
        <td>${days>=999?'<span style="color:var(--t2);font-size:11px">-</span>':days+'<span style="font-size:10px;color:var(--t2)">天</span>'}</td>
        <td>${item.total_30d}</td><td>${item.total_15d}</td><td>${item.answered_15d}</td><td>${p}</td>
        <td><button class="detail-btn" onclick="toggle('c${i}')"><i class="fas fa-chevron-down"></i></button></td></tr>
        <tr class="detail" id="c${i}"><td colspan="12"><div class="dp">${hist(item.calls_history)}</div></td></tr>`;
    }else if(type==='freq'){
      const rc=item.block_reason&&item.block_reason.includes('接通')?'r1':'r2';
      h+=`<tr><td>${i+1}</td><td style="font-family:monospace;font-weight:500;font-size:12px">${item.phone}</td>
        <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:var(--t2)">${item.latest_task||'-'}</td>
        <td style="font-size:11px">${item.region||'-'}</td>
        <td><span class="rule-badge ${rc}">${item.block_reason||'-'}</span></td>
        <td>${item.total_30d}</td><td>${item.total_15d}</td><td>${item.answered_15d}</td>
        <td style="font-size:11px;font-family:monospace;color:var(--t2)">${item.last_call_time?item.last_call_time.slice(5,10):'-'}</td>
        <td><button class="detail-btn" onclick="toggle('f${i}')"><i class="fas fa-chevron-down"></i></button></td></tr>
        <tr class="detail" id="f${i}"><td colspan="10"><div class="dp">${hist(item.calls_history)}</div></td></tr>`;
    }else{
      h+=`<tr><td>${i+1}</td><td style="font-family:monospace;font-weight:500;font-size:12px">${item.phone}</td>
        <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:var(--t2)">${item.latest_task||'-'}</td>
        <td style="font-size:11px">${item.region||'-'}</td>
        <td><span class="rule-badge r3">${item.block_reason||'-'}</span></td>
        <td style="font-size:11px;color:var(--t2)">${(item.all_statuses||[]).slice(0,3).join('、')}</td>
        <td style="font-size:11px;font-family:monospace;color:var(--t2)">${item.last_call_time?item.last_call_time.slice(5,10):'-'}</td>
        <td><button class="detail-btn" onclick="toggle('o${i}')"><i class="fas fa-chevron-down"></i></button></td></tr>
        <tr class="detail" id="o${i}"><td colspan="8"><div class="dp">${hist(item.calls_history)}</div></td></tr>`;
    }
  });
  if(hasMore){
    h+=`<tr><td colspan="13" style="text-align:center;padding:12px;color:var(--t2);font-size:11px;border:none">仅展示前 ${DISPLAY_LIMIT} 条，共 ${items.length} 条。下载Excel查看全部</td></tr>`;
  }
  h+='</tbody></table>';el.innerHTML=h;
}

function hist(calls){
  if(!calls||!calls.length) return '<div style="color:var(--t2);font-size:11px;padding:4px">无近30天记录</div>';
  let h='<div class="sl"><i class="fas fa-history"></i> 近30天外呼记录</div><table class="ct"><thead><tr><th>#</th><th>时间</th><th>状态</th><th>任务</th><th>归属地</th></tr></thead><tbody>';
  calls.forEach((c,i)=>{
    let sc='sto';
    if(c.s==='已接听') sc='sta';
    else if(['忙线中','呼叫受限'].includes(c.s)) sc='stb';
    h+=`<tr><td>${i+1}</td><td style="font-family:monospace;font-size:11px">${c.t.slice(5,16)}</td><td><span class="st ${sc}">${c.s}</span></td><td style="color:var(--t2);max-width:150px;overflow:hidden;text-overflow:ellipsis;font-size:11px">${c.task||'-'}</td><td style="font-size:11px;color:var(--t2)">${c.region||'-'}</td></tr>`;
  });
  h+='</tbody></table>';return h;
}

function toggle(id){const el=document.getElementById(id);if(el)el.classList.toggle('show')}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');document.getElementById(id).classList.add('active');
}

function renderCharts(summary){
  new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{labels:['✅ 合规可外呼','🚫 风控拦截','⛔ 其他屏蔽'],datasets:[{data:[summary.compliant,summary.freq_block,summary.other_block],backgroundColor:['#00b894','#fdcb6e','#e17055'],borderColor:['rgba(10,10,18,.6)','rgba(10,10,18,.6)','rgba(10,10,18,.6)'],borderWidth:3,hoverOffset:10}]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'rgba(255,255,255,.55)',padding:12,font:{size:11},usePointStyle:true,pointStyle:'circle'}}},cutout:'64%'}
  });
  const rcount=summary.freq_block||0;
  new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:['外呼上限','接通上限','语音助手','A意向','B意向'],datasets:[{label:'数量',data:[rcount,0,summary.other_block||0,0,0],backgroundColor:['rgba(253,203,110,.6)','rgba(225,112,85,.6)','rgba(149,165,166,.6)','rgba(9,132,227,.6)','rgba(9,132,227,.6)'],borderRadius:6,barPercentage:.55}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'rgba(255,255,255,.3)',stepSize:1,precision:0,font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'rgba(255,255,255,.45)',font:{size:10}},grid:{display:false}}}}
  });
}

async function downloadList(type){
  if(!resultData)return;
  const names={compliant:'合规外呼名单',freq:'风控拦截名单',other:'其他屏蔽名单'};
  const eps={compliant:'/api/download/compliant',freq:'/api/download/freq_block',other:'/api/download/other_block'};
  toast('生成 '+names[type]+'...','i');
  try{
    const res=await fetch(eps[type],{method:'POST'});
    if(!res.ok){const e=await res.json();toast(e.error||'下载失败','e');return}
    const blob=await res.blob(),url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=names[type]+'.xlsx';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    toast('下载完成','s');
  }catch(e){toast('下载失败','e')}
}

async function loadStats(){
  try{
    const res=await fetch('/api/stats');const d=await res.json();
    document.getElementById('hdr').innerHTML='<div class="d"><i class="far fa-clock" style="font-size:11px"></i><span id="clock">'+(new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}))+'</span></div><div class="d"><i class="fas fa-database"></i><span>'+(d.total_phones/10000).toFixed(1)+'万号码 · '+(d.total_calls/10000).toFixed(1)+'万记录</span></div>';
    document.getElementById('sTotal').textContent=d.total_phones.toLocaleString();
    document.getElementById('sDbRef').textContent='数据截至 '+d.ref_date+' · 总记录 '+d.total_calls.toLocaleString()+' 条';
  }catch(e){}
}
loadStats();
setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})},1000);
</script>
